name: Lakehouse CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-static-validation:
    name: Python and shell validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Show Python version
        run: |
          python --version

      - name: Compile Python files
        run: |
          python -m compileall -q spark-batch sql airflow/dags

      - name: Validate shell scripts
        run: |
          bash -n scripts/run_airflow_task.sh
          if [ -f create_power_bi_assets.sh ]; then
            bash -n create_power_bi_assets.sh
          fi

  dbt-validation:
    name: dbt project validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dbt
        run: |
          python -m pip install --upgrade "pip>=25,<26" setuptools wheel
          python -m pip install dbt-core==1.10.15 dbt-duckdb==1.9.6

      - name: Validate dbt project parse
        run: |
          mkdir -p data/dbt
          cd dbt
          dbt parse --profiles-dir .

  terraform-validation:
    name: Terraform validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform format check
        run: |
          terraform fmt -check -recursive terraform

      - name: Terraform init without backend
        working-directory: terraform/aws-bi-exports
        run: |
          terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform/aws-bi-exports
        run: |
          terraform validate

  repository-guardrails:
    name: Repository guardrails
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Ensure sensitive Terraform files are not tracked
        run: |
          if git ls-files | grep -E '(^|/)(terraform\.tfvars|.*\.tfstate|.*\.tfstate\.backup|tfplan)$'; then
            echo "Sensitive Terraform runtime file is tracked. Remove it from Git."
            exit 1
          fi

      - name: Ensure AWS credentials are not tracked
        run: |
          if git ls-files | grep -E '(^|/)\.aws/(credentials|config)$'; then
            echo "AWS credential/config file is tracked. Remove it from Git."
            exit 1
          fi

      - name: Ensure required project assets exist
        run: |
          test -f airflow/dags/batch_lakehouse_pipeline.py
          test -f scripts/run_airflow_task.sh
          test -f dbt/dbt_project.yml
          test -f terraform/aws-bi-exports/main.tf
          test -f terraform/aws-bi-exports/variables.tf
          test -f terraform/aws-bi-exports/outputs.tf
          test -f sql/export_power_bi_dataset.py
          test -f sql/power_bi_dashboard_queries.sql
          test -f docs/airflow_orchestration.md
          test -f docs/terraform_aws_bi_exports.md
